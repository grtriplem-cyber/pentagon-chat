<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOS FORUM v1.7</title>
    <style>
        body { 
            background-color: #C0C0C0; 
            color: #000000;            
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 10px;
            text-transform: uppercase;
        }
        .border { 
            border: 3px double #000000; 
            min-height: 95vh; 
            padding: 10px; 
            position: relative;
            background-color: #C0C0C0;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .header { 
            text-align: center; 
            background-color: #000080; 
            color: #FFFFFF;            
            padding: 10px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            border: 1px solid #000000;
            font-size: 14px;
        }
        
        #chat-display {
            height: 350px; 
            max-height: 50vh;
            background-color: #000000;
            color: #00FF00;
            padding: 10px;
            border: 2px solid #555;
            margin-bottom: 15px;
            overflow-y: auto;
            font-size: 13px;
            text-transform: none;
            box-shadow: inset 0 0 10px #003300;
        }

        .input-group {
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #808080; 
            padding: 10px; 
            border: 1px solid #000;
        }
        
        .input-row {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        input { 
            background: #FFF;
            border: 1px solid #000; 
            padding: 8px; 
            font-family: 'Courier New', monospace;
            font-size: 16px; 
        }
        
        #send-btn {
            background-color: #000080; 
            color: white; 
            border: none; 
            padding: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: 'Courier New', monospace;
            width: 100%;
        }

        .footer { 
            margin-top: auto;
            border-top: 1px solid #000000; 
            padding-top: 10px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 10px;
        }

        @media (min-width: 600px) {
            body { padding: 20px; }
            .header { font-size: 18px; }
            .footer { font-size: 14px; }
            #chat-display { height: 400px; }
        }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #00FF00; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="border">
        <div class="header">PENTAGON ROOM - MOBILE TERMINAL v1.7</div>
        
        <div id="chat-display">ESTABLISHING SECURE UPLINK...</div>
        
        <div class="input-group">
            <div class="input-row">
                <span style="font-weight: bold; min-width: 70px;">USER:</span>
                <input type="text" id="user-input" placeholder="ANON" maxlength="10" style="width: 100%;">
            </div>
            
            <div class="input-row">
                <span style="font-weight: bold; min-width: 70px;">MSG:</span>
                <input type="text" id="msg-input" placeholder="TYPE HERE..." style="flex-grow: 1;" onkeypress="checkEnter(event)">
            </div>

            <button id="send-btn" onclick="sendToSheet()">
                [ EXECUTE_TRANSMISSION ]
            </button>
        </div>

        <div class="footer">
            <span>UPLINK: ACTIVE</span>
            <span>NODE: NETLIFY_SRV</span>
        </div>
    </div>

    <script>
       const scriptURL = 'https://script.google.com/macros/s/AKfycbzt7swbB-abP5xPYU7Ymtdew5CK-nOZFVxFCMmuB746rs5tAnvRB4lKtFSNzLV238rM/exec'; 
    let lastMessageCount = 0; 
    let isFirstLoad = true;

    // โหลดชื่อ User เดิมที่เคยพิมพ์ไว้ (ถ้ามี)
    document.getElementById('user-input').value = localStorage.getItem('chat_username') || '';

    function requestNotificationPermission() {
        if ("Notification" in window) {
            Notification.requestPermission();
        }
    }

    function checkEnter(e) { if (e.key === 'Enter') sendToSheet(); }

    function loadMessages() {
        fetch(scriptURL)
        .then(res => res.json())
        .then(data => {
            const display = document.getElementById('chat-display');
            if (data && data.length > 0) {
                
                if (!isFirstLoad && data.length > lastMessageCount) {
                    const newMsg = data[data.length - 1];
                    if (Notification.permission === "granted") {
                        new Notification("PENTAGON MSG", {
                            body: `${newMsg[1]}: ${newMsg[2]}`,
                            icon: "https://cdn-icons-png.flaticon.com/512/684/684809.png"
                        });
                    }
                }

                lastMessageCount = data.length;
                isFirstLoad = false;

                // อัปเดตข้อความและลบข้อความ Welcome เริ่มต้นออก
                display.innerHTML = data.map(row => {
                    let msg = row[2];
                    const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp|svg))/i;
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    
                    let content = imgRegex.test(msg) 
                        ? `<img src="${msg}" style="max-width:100%; max-height:200px; border:1px solid #00FF00; margin-top:5px; display:block;">`
                        : msg.replace(urlRegex, url => `<a href="${url}" target="_blank" style="color:#FFFF00;">${url}</a>`);

                    return `<div style="margin-bottom:10px; border-bottom:1px dashed #003300; padding-bottom:5px;">
                        <span style="color:#666; font-size:10px;">[${new Date(row[0]).toLocaleTimeString()}]</span> 
                        <b style="color:#FFF;">${row[1]}:</b> <span style="word-break:break-all; text-transform:none;">${content}</span>
                    </div>`;
                }).join('') + '<span class="cursor">_</span>';
                
                // เลื่อนลงล่างสุดอัตโนมัติ
                display.scrollTop = display.scrollHeight;
            }
        });
    }

    function sendToSheet() {
        const userField = document.getElementById('user-input');
        const msgField = document.getElementById('msg-input');
        const user = userField.value || 'ANON';
        const msg = msgField.value;
        const btn = document.getElementById('send-btn');
        
        if(!msg) return;

        // จำชื่อ User ไว้ในเครื่อง
        localStorage.setItem('chat_username', user);

        btn.innerText = "[ SENDING... ]";
        btn.disabled = true;

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify({ username: user, message: msg })
        }).then(() => {
            msgField.value = '';
            btn.innerText = "[ EXECUTE_TRANSMISSION ]";
            btn.disabled = false;
            loadMessages(); 
        });
    }

    requestNotificationPermission();
    setInterval(loadMessages, 5000);
    loadMessages();
    </script>
</body>
</html>
